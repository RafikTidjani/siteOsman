<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4EDDE"/>
      <stop offset="100%" style="stop-color:#EEE3CC"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg3)"/>
  <!-- Triangle pattern -->
  <polygon points="600,100 750,360 450,360" fill="none" stroke="#cbfb78" stroke-width="1.5" opacity="0.3"/>
  <polygon points="600,160 710,340 490,340" fill="none" stroke="#cbfb78" stroke-width="1" opacity="0.2"/>
  <!-- Inverted triangle -->
  <polygon points="600,700 750,440 450,440" fill="none" stroke="#cbfb78" stroke-width="1.5" opacity="0.3"/>
  <polygon points="600,640 710,460 490,460" fill="none" stroke="#cbfb78" stroke-width="1" opacity="0.2"/>
  <!-- Corner decorations - small squares -->
  <rect x="50" y="50" width="40" height="40" fill="#cbfb78" opacity="0.15"/>
  <rect x="110" y="50" width="40" height="40" fill="#cbfb78" opacity="0.1"/>
  <rect x="50" y="110" width="40" height="40" fill="#cbfb78" opacity="0.1"/>
  <rect x="1110" y="710" width="40" height="40" fill="#cbfb78" opacity="0.15"/>
  <rect x="1050" y="710" width="40" height="40" fill="#cbfb78" opacity="0.1"/>
  <rect x="1110" y="650" width="40" height="40" fill="#cbfb78" opacity="0.1"/>
  <!-- Horizontal lines -->
  <line x1="150" y1="400" x2="450" y2="400" stroke="#333333" stroke-width="0.5" opacity="0.1"/>
  <line x1="750" y1="400" x2="1050" y2="400" stroke="#333333" stroke-width="0.5" opacity="0.1"/>
  <!-- Vertical accent -->
  <line x1="600" y1="50" x2="600" y2="100" stroke="#cbfb78" stroke-width="2" opacity="0.4"/>
  <line x1="600" y1="700" x2="600" y2="750" stroke="#cbfb78" stroke-width="2" opacity="0.4"/>
  <!-- Number -->
  <text x="600" y="420" font-family="Georgia, serif" font-size="180" fill="#333333" text-anchor="middle" opacity="0.12">03</text>
  <text x="600" y="480" font-family="Georgia, serif" font-size="24" fill="#333333" text-anchor="middle" opacity="0.25">Project</text>
</svg>